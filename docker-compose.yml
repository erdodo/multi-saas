services:
  postgres:
    image: postgres:16-alpine
    container_name: multi-saas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgresql
      POSTGRES_PASSWORD: postgresql
      POSTGRES_DB: postgresql
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgresql"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-saas-app
    restart: unless-stopped
    # Port dışa açık değil — cloudflared iç ağdan erişir
    expose:
      - "3000"
    environment:
      DATABASE_URL: "postgresql://postgresql:postgresql@postgres:5432/postgresql"
      NEXTAUTH_SECRET: "jV0sMKY0MQP7Vzkf9p1Gi04Ueb3LCwaHC2L0zq1ofFk="
      NEXTAUTH_URL: "https://saas.erdoganyesil.org"
      NODE_ENV: "production"
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: multi-saas-cloudflared
    restart: unless-stopped
    # Config dosyasındaki ingress kuralları routing'i tanımlar (saas.erdoganyesil.org → app:3000)
    # Token sadece kimlik doğrulama için kullanılır, routing buradan gelir.
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
